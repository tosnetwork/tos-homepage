<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Carrier pigeon / messaging bird icon -->
  <defs>
    <linearGradient id="bird-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Body -->
  <path d="M20 38c-2 4-1 8 3 10 4 2 10 1 14-2 3-2 6-5 8-9 1-3 1-6-1-8l-4-4c-2-2-5-3-8-2l-8 4c-3 2-5 5-4 8z" fill="url(#bird-grad)" opacity="0.9"/>
  <!-- Wing -->
  <path d="M24 30c-4-3-8-8-10-13-1-3 0-5 2-4 3 1 7 5 10 9l6 8c1 2 0 3-2 2l-6-2z" fill="url(#bird-grad)" opacity="0.7"/>
  <!-- Head -->
  <circle cx="42" cy="27" r="5" fill="url(#bird-grad)"/>
  <!-- Beak -->
  <path d="M46 26l6-2c1 0 1 1 0 2l-5 2c-1 0-2-1-1-2z" fill="#f59e0b"/>
  <!-- Eye -->
  <circle cx="43" cy="26" r="1.2" fill="white"/>
  <!-- Tail feathers -->
  <path d="M14 40c-3 1-7 0-9-2-1-1 0-2 1-2 3 1 6 1 8 0l3 2c0 1-1 2-3 2z" fill="url(#bird-grad)" opacity="0.6"/>
  <!-- Envelope/letter carried -->
  <rect x="30" y="38" width="10" height="7" rx="1" fill="white" stroke="#6366f1" stroke-width="1.2"/>
  <path d="M30 39l5 3.5 5-3.5" stroke="#6366f1" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Signal waves -->
  <path d="M48 20c2-2 4-2 4 0" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M50 17c3-3 6-2 5 1" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.4"/>
</svg>
