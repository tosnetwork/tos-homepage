<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Advanced Cryptography - Multiple elliptic curves -->
  <defs>
    <linearGradient id="cryptoGradient" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Main elliptic curve -->
  <path d="M16 32Q16 16 32 16T48 32Q48 48 32 48T16 32"
        stroke="url(#cryptoGradient)" stroke-width="2" fill="none"/>

  <!-- Second curve (overlapping) -->
  <path d="M20 36Q20 24 32 20T44 36Q44 48 32 52T20 36"
        stroke="url(#cryptoGradient)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Center point (generator point) -->
  <circle cx="32" cy="26" r="3" fill="url(#cryptoGradient)"/>

  <!-- Hash function symbol -->
  <text x="32" y="36" font-family="monospace" font-size="14" font-weight="bold"
        fill="url(#cryptoGradient)" text-anchor="middle">H</text>

  <!-- Corner nodes representing different curves -->
  <circle cx="14" cy="14" r="2" fill="url(#cryptoGradient)" opacity="0.8"/>
  <circle cx="50" cy="14" r="2" fill="url(#cryptoGradient)" opacity="0.8"/>
  <circle cx="14" cy="50" r="2" fill="url(#cryptoGradient)" opacity="0.8"/>
  <circle cx="50" cy="50" r="2" fill="url(#cryptoGradient)" opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="14" y1="14" x2="32" y2="26" stroke="url(#cryptoGradient)" stroke-width="1" opacity="0.3"/>
  <line x1="50" y1="14" x2="32" y2="26" stroke="url(#cryptoGradient)" stroke-width="1" opacity="0.3"/>
</svg>
